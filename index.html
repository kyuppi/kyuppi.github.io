<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>予約・注文フォーム</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; line-height: 1.6; }
        .banner { background: #fff3cd; color: #856404; padding: 15px; border-left: 5px solid #ffc107; margin-bottom: 20px; display: none; font-weight: bold; }
        input, select, button { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>
    <div id="holiday-banner" class="banner">【重要】本日は臨時休業のため、予約を受け付けておりません。</div>
    <h2>予約・注文フォーム</h2>
    <form action="https://formsubmit.co/kyuppi000@gmail.com" method="POST">
        <input type="text" name="お名前" placeholder="お名前" required>
        <select id="menu-select" name="メニュー" required></select>
        <button type="submit" id="submit-btn">予約を確定する</button>
    </form>

    <script>
        const BIN_ID = '6584289a0574da7622da443d';
        const KEY = '$2a$10$wN9D9aJID76bN7N0/C6yUe0FwN7O.Z3VjUo88.ZqgY8S32eKeZJu6';

        async function load() {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {headers: {'X-Master-Key': KEY}});
            const d = (await res.json()).record;
            if(d.isHoliday) { document.getElementById('holiday-banner').style.display = 'block'; document.getElementById('submit-btn').disabled = true; }
            let s = document.getElementById('menu-select');
            const add = (name, sold) => s.innerHTML += `<option ${sold?'disabled':''}>${name}${sold?'（売り切れ）':''}</option>`;
            add("コースA", d.soldOutA);
            add("コースB", d.soldOutB);
            d.customMenus.forEach(m => add(m.name, m.soldOut));
        }
        load();
    </script>
</body>
</html>
