<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>レストラン予約システム - ご予約画面</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">RESTAURANT NAME</div>
            <p class="subtitle">オンライン予約システム</p>
        </header>

        <main>
            <section class="booking-card">
                <h2>ご予約情報の入力</h2>
                <p class="notice">※グレーアウトしている日付は臨時休業日です。売り切れの商品は選択できません。</p>
                
                <form id="reserve-form">
                    <div class="form-group">
                        <label for="reserve-date">1. ご来店日の選択</label>
                        <input type="date" id="reserve-date" required>
                        <span id="date-message" class="error-message"></span>
                    </div>

                    <div class="form-group">
                        <label for="reserve-time">2. ご来店時間の選択</label>
                        <select id="reserve-time" required disabled>
                            <option value="">日付を先に選択してください</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="reserve-menu">3. ご希望メニューの選択</label>
                        <select id="reserve-menu" required disabled>
                            <option value="">日付を先に選択してください</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="reserve-guests">4. ご利用人数の選択</label>
                        <select id="reserve-guests" required>
                            <option value="1">1名</option>
                            <option value="2" selected>2名</option>
                            <option value="3">3名</option>
                            <option value="4">4名</option>
                            <option value="5">5名</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="user-name">5. お名前</label>
                        <input type="text" id="user-name" placeholder="山田 太郎" required>
                    </div>

                    <div class="form-group">
                        <label for="user-phone">6. 電話番号</label>
                        <input type="tel" id="user-phone" placeholder="09012345678" required>
                    </div>

                    <div class="action-area">
                        <button type="submit" id="btn-submit-reserve" class="btn btn-line">
                            <svg class="line-icon" viewBox="0 0 24 24" width="20" height="20">
                                <path fill="currentColor" d="M24 10.304c0-5.231-5.383-9.484-12-9.484s-12 4.253-12 9.484c0 4.69 4.27 8.625 10.046 9.362.392.085.926.258 1.061.593.122.3.08.77.039 1.074l-.173 1.041c-.052.312-.253 1.222 1.092.666 1.345-.556 7.241-4.264 9.882-7.298 2.302-2.484 3.073-4.834 3.073-6.438zm-15.422.955h-1.89c-.296 0-.537-.24-.537-.537v-3.053c0-.296.241-.537.537-.537s.537.241.537.537v2.516h1.353c.296 0 .537.241.537.537s-.241.537-.537.537zm2.417-.537c0 .296-.241.537-.537.537h-.002c-.296 0-.537-.241-.537-.537v-3.053c0-.296.241-.537.537-.537s.537.241.537.537v3.053zm3.766 0c0 .248-.168.463-.411.523-.042.01-.085.015-.127.015-.246 0-.462-.167-.518-.415l-.946-4.135-.008-.053v2.859c0 .296-.241.537-.537.537s-.241-.537-.537-.537v-3.053c0-.248.168-.463.411-.522.043-.01.085-.015.127-.015.247 0 .463.167.519.415l.946 4.136.008.052v-2.859c0-.296.241-.537.537-.537s.537.241.537.537v3.053zm3.228-1.074h-1.353v-.443h1.353c.296 0 .537-.241.537-.537s-.241-.537-.537-.537h-1.89c-.296 0-.537.241-.537.537v3.053c0 .296.241.537.537.537h1.89c.296 0 .537-.241.537-.537s-.241-.537-.537-.537z"/>
                            </svg>
                            LINE連携して予約を確定する
                        </button>
                    </div>
                </form>
            </section>
        </main>
    </div>
    <script src="js/reserve.js"></script>
</body>
</html>
