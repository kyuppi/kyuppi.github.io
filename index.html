<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ご予約フォーム</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --background-color: #f5f7fa;
            --card-background: #ffffff;
            --text-color: #333333;
            --border-color: #e1e4e8;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .reservation-card {
            background: var(--card-background);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
            color: #2c3e50;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 14px;
            color: #555;
        }

        input[type="text"],
        input[type="tel"],
        input[type="email"],
        input[type="datetime-local"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .submit-btn {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #357abd;
        }

        .footer-note {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="reservation-card">
    <h2>オンライン予約</h2>
    
    <form action="https://formsubmit.co/あなたのGmailアドレス@gmail.com" method="POST">
        
        <input type="hidden" name="_captcha" value="false">
        
        <input type="hidden" name="_subject" value="【自動通知】新しい予約の申し込みが入りました！">

        <div class="form-group">
            <label for="name">お名前 <span style="color: red;">*</span></label>
            <input type="text" id="name" name="お名前" placeholder="山田 太郎" required>
        </div>

        <div class="form-group">
            <label for="tel">電話番号 <span style="color: red;">*</span></label>
            <input type="tel" id="tel" name="電話番号" placeholder="090-1234-5678" required>
        </div>

        <div class="form-group">
            <label for="email">メールアドレス</label>
            <input type="email" id="email" name="メールアドレス" placeholder="yamada@example.com">
        </div>

        <div class="form-group">
            <label for="datetime">ご予約日時 <span style="color: red;">*</span></label>
            <input type="datetime-local" id="datetime" name="ご予約日時" required>
        </div>

        <div class="form-group">
            <label for="guests">ご利用人数 <span style="color: red;">*</span></label>
            <select id="guests" name="ご利用人数" required>
                <option value="" disabled selected>選択してください</option>
                <option value="1名">1名</option>
                <option value="2名">2名</option>
                <option value="3名">3名</option>
                <option value="4名">4名</option>
                <option value="5名以上">5名以上</option>
            </select>
        </div>

        <div class="form-group">
            <label for="comments">ご要望・備考欄</label>
            <textarea id="comments" name="ご要望・備考" placeholder="アレルギーや、ご質問があれば入力してください。"></textarea>
        </div>

        <button type="submit" class="submit-btn">予約を確定する</button>
    </form>
    
    <div class="footer-note">
        ※ボタンを押すと予約内容がお店のGmail宛てに送信されます。
    </div>
</div>

</body>
</html>
