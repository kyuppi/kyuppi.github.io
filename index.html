<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飲食店予約サイト</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>サンプルレストラン</h1>
        <p>ご予約はこちらから</p>
    </header>

    <main>

        <section class="menu">
            <h2>メニュー</h2>

            <div class="item">
                <h3>メニューA</h3>
                <p>500円</p>
            </div>

            <div class="item">
                <h3>メニューB</h3>
                <p>800円</p>
            </div>
        </section>

        <section class="booking">
            <h2>予約フォーム</h2>

            <form
                action="https://formsubmit.co/kyuppi000@gmail.com"
                method="POST">

                <input type="hidden" name="_subject" value="新しい予約が入りました">

                <input type="text"
                       name="お名前"
                       placeholder="お名前"
                       required>

                <input type="tel"
                       name="電話番号"
                       placeholder="電話番号"
                       required>

                <input type="date"
                       name="予約日"
                       required>

                <input type="time"
                       name="予約時間"
                       required>

                <input type="number"
                       name="人数"
                       min="1"
                       placeholder="人数"
                       required>

                <select name="メニュー">
                    <option>メニューA</option>
                    <option>メニューB</option>
                </select>

                <textarea
                    name="備考"
                    placeholder="備考"></textarea>

                <button type="submit">
                    予約する
                </button>

            </form>

        </section>

    </main>

    <script src="app.js"></script>

</body>
</html>
