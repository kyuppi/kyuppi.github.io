<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>店舗管理画面 - 総合コントロールパネル</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #eef2f5; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin:0; }
        .admin-card { background: white; padding: 30px; border-radius: 12px; width: 100%; max-width: 450px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 20px; }
        .section { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 5px solid #4a90e2; }
        .section-title { font-weight: bold; margin-bottom: 10px; color: #333; display: flex; align-items: center; }
        .toggle-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 8px 0; border-bottom: 1px solid #eee; }
        .btn { padding: 8px 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: white; background-color: #28a745; transition: 0.2s; }
        .btn.active { background-color: #dc3545; }
        .del-btn { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; margin-left: 10px; }
        .save-btn { width: 100%; padding: 14px; border: none; border-radius: 6px; background: #007bff; color: white; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 20px; transition: 0.2s; }
        .save-btn:disabled { background: #ccc; cursor: not-allowed; }
        input[type="password"], input[type="text"] { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .add-box { display: flex; gap: 10px; }
        #login-form { display: block; }
        #admin-panel { display: none; }
    </style>
</head>
<body>

<div class="admin-card">
    <div id="login-form">
        <h2>店舗管理ログイン</h2>
        <input type="password" id="password-input" placeholder="パスワードを入力">
        <button class="save-btn" onclick="checkPassword()">ログイン</button>
    </div>

    <div id="admin-panel">
        <h2>店舗管理パネル</h2>
        
        <div class="section">
            <div class="section-title">🛑 営業ステータス</div>
            <div class="toggle-box">
                <span>臨時休業モード</span>
                <button id="btn-holiday" class="btn" onclick="toggle('isHoliday')">通常営業中</button>
            </div>
        </div>

        <div class="section">
            <div class="section-title">➕ メニュー追加</div>
            <div class="add-box">
                <input type="text" id="new-menu-name" placeholder="メニュー名">
                <button class="btn" onclick="addCustomMenu()">追加</button>
            </div>
        </div>

        <div class="section">
            <div class="section-title">🍳 売り切れ設定</div>
            <div class="toggle-box"><span>コースA</span><button id="btn-menuA" class="btn" onclick="toggle('soldOutA')">販売中</button></div>
            <div class="toggle-box"><span>コースB</span><button id="btn-menuB" class="btn" onclick="toggle('soldOutB')">販売中</button></div>
            <div id="custom-menu-list"></div>
        </div>

        <button id="save-btn" class="save-btn" onclick="saveToCloud()">設定を保存して公開する</button>
    </div>
</div>

<script>
    const PASSWORD = '1234';
    const BIN_ID = '6584289a0574da7622da443d';
    const KEY = '$2a$10$wN9D9aJID76bN7N0/C6yUe0FwN7O.Z3VjUo88.ZqgY8S32eKeZJu6';
    let data = { isHoliday: false, soldOutA: false, soldOutB: false, customMenus: [] };

    function checkPassword() {
        if(document.getElementById('password-input').value === PASSWORD) {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            fetchData();
        } else { alert('パスワードが違います'); }
    }

    async function fetchData() {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {headers: {'X-Master-Key': KEY}});
        data = (await res.json()).record;
        render();
    }

    function toggle(key) { data[key] = !data[key]; render(); }
    function addCustomMenu() {
        const name = document.getElementById('new-menu-name').value.trim();
        if(!name) return;
        data.customMenus.push({name: name, soldOut: false});
        document.getElementById('new-menu-name').value = '';
        render();
    }
    function delMenu(i) { data.customMenus.splice(i, 1); render(); }
    
    function render() {
        document.getElementById('btn-holiday').className = 'btn ' + (data.isHoliday ? 'active' : '');
        document.getElementById('btn-holiday').innerText = data.isHoliday ? '休業中' : '通常営業中';
        document.getElementById('btn-menuA').className = 'btn ' + (data.soldOutA ? 'active' : '');
        document.getElementById('btn-menuA').innerText = data.soldOutA ? '売り切れ' : '販売中';
        document.getElementById('btn-menuB').className = 'btn ' + (data.soldOutB ? 'active' : '');
        document.getElementById('btn-menuB').innerText = data.soldOutB ? '売り切れ' : '販売中';
        
        let list = document.getElementById('custom-menu-list');
        list.innerHTML = '';
        data.customMenus.forEach((m, i) => {
            list.innerHTML += `<div class="toggle-box"><span>${m.name}</span><div><button class="btn ${m.soldOut ? 'active' : ''}" onclick="data.customMenus[${i}].soldOut=!data.customMenus[${i}].soldOut; render();">${m.soldOut ? '売り切れ' : '販売中'}</button><button class="del-btn" onclick="delMenu(${i})">✕</button></div></div>`;
        });
    }

    async function saveToCloud() {
        const btn = document.getElementById('save-btn');
        btn.disabled = true; btn.innerText = '保存中...';
        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, { method: 'PUT', headers: {'Content-Type': 'application/json', 'X-Master-Key': KEY}, body: JSON.stringify(data) });
        alert('保存完了！お客様画面に即時反映されました');
        btn.disabled = false; btn.innerText = '設定を保存して公開する';
    }
</script>
</body>
</html>
